<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <radialGradient id="shine" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#bfdbfe" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.4"/>

  <!-- Stylized "L" formed by light beam -->
  <path d="M 196 116 L 196 396 L 336 396"
        fill="none"
        stroke="url(#glow)"
        stroke-width="36"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Luminous dot - the "end" emitting light -->
  <circle cx="256" cy="116" r="24" fill="url(#glow)"/>
  <circle cx="256" cy="116" r="44" fill="url(#shine)"/>

  <!-- Bottom serif -->
  <circle cx="336" cy="396" r="14" fill="#60a5fa"/>
</svg>