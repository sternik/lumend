name: Release webOS package

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app and package IPK
        run: |
          npm run build
          npm run webos:package

      - name: Upload IPK to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            com.sternik.lumend_*_all.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
