name: Release webOS package

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app and package IPK
        run: |
          npm run build
          npm run webos:package

      - name: Extract release notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Extract section between ## vX.Y.Z and the next ## or EOF
          awk "/^## ${GITHUB_REF_NAME}/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "No release notes found for ${GITHUB_REF_NAME} in CHANGELOG.md"
            exit 1
          fi

      - name: Create release and upload IPK
        uses: softprops/action-gh-release@v3
        with:
          body_path: release-body.md
          files: |
            Lumend-*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
